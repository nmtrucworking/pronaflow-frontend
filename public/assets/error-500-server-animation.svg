<svg width="400" height="350" viewBox="0 0 400 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serverBody" x1="50" y1="50" x2="350" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="dangerPulse" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCA5A5"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <rect x="50" y="50" width="300" height="250" rx="16" fill="url(#serverBody)" stroke="#94A3B8" stroke-width="2"/>

  <rect x="70" y="82" width="260" height="42" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <circle cx="92" cy="103" r="5" fill="#10B981">
    <animate attributeName="r" values="4.2;5.8;4.2" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.65;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <rect x="112" y="98" width="190" height="10" rx="4" fill="#E2E8F0">
    <animate attributeName="width" values="140;200;160;190;140" dur="4.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="70" y="142" width="260" height="42" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <circle cx="92" cy="163" r="5" fill="#10B981">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="112" y="158" width="175" height="10" rx="4" fill="#E2E8F0">
    <animate attributeName="width" values="175;145;190;150;175" dur="3.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="70" y="202" width="260" height="42" rx="8" fill="#FEF2F2" stroke="#FCA5A5"/>
  <circle cx="92" cy="223" r="5" fill="#EF4444">
    <animate attributeName="fill" values="#EF4444;#F97316;#EF4444" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4.5;6;4.5" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <rect x="112" y="218" width="95" height="10" rx="4" fill="#FECACA">
