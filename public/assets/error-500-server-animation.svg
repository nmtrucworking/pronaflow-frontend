    <path d="M38 17L56 49H20L38 17Z" fill="url(#dangerPulse)">
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1" additive="sum" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <rect x="36" y="30" width="4" height="14" rx="2" fill="white"/>
    <circle cx="38" cy="50" r="2.4" fill="white"/>
