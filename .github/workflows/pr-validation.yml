name: PR - Validation & Checks

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    name: Validate PR Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          validateSingleCommit: false
          validateSingleCommitMatchesPrTitle: false

      - name: Check commit messages
        run: |
          # Check if commits have proper format
          COMMIT_MSG=$(git log --format=%B -n 1)
          if [[ ! $COMMIT_MSG =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci): ]]; then
            echo "⚠️  Warning: Commit message might not follow Conventional Commits format"
            echo "Expected format: feat|fix|docs|style|refactor|perf|test|chore|ci: description"
          fi
        continue-on-error: true

  file-check:
    name: Check Modified Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect modified files
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'src/services/**'
              - 'src/types/**'
            frontend:
              - 'src/components/**'
              - 'src/features/**'
            docs:
              - 'docs/**'
              - 'README.md'
            config:
              - 'tsconfig*'
              - 'vite.config.ts'
              - 'eslint.config.js'

      - name: Comment on PR with file info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const filters = ${{ steps.filter.outputs.changes }};
            let comment = '📁 Modified file categories:\n';
            if (filters.frontend) comment += '- Frontend components/features\n';
            if (filters.backend) comment += '- Backend services/types\n';
            if (filters.docs) comment += '- Documentation\n';
            if (filters.config) comment += '- Configuration files\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  size-check:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Check dist size
        run: |
          DIST_SIZE=$(du -sh ./dist | cut -f1)
          echo "📦 Build size: $DIST_SIZE"
          
          # Get size in KB
          SIZE_KB=$(du -sk ./dist | cut -f1)
          if [ $SIZE_KB -gt 5000 ]; then
            echo "⚠️  Warning: Build size exceeds 5MB ($SIZE_KB KB)"
          else
            echo "✅ Build size OK: $SIZE_KB KB"
          fi
